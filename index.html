<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>anomaly:thread</title>
  <!-- Tailwind CSS 로드 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 및 Babel 로드 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #09090b; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function AbnormalCommunity() {
      const [selectedPost, setSelectedPost] = useState(null);
      const [menu, setMenu] = useState("전체");
      const [notification, setNotification] = useState("로컬 시스템 안정화 완료");
      const [search, setSearch] = useState("");
      const [likedPosts, setLikedPosts] = useState([]);
      const [isWriting, setIsWriting] = useState(false);

      const [title, setTitle] = useState("");
      const [content, setContent] = useState("");

      // 로컬 스토리지 연동 (새로고침해도 글 유지됨)
      const [posts, setPosts] = useState(() => {
        const saved = localStorage.getItem("anomaly_posts");
        return saved ? JSON.parse(saved) : [
          {
            id: 1,
            title: "징후를 목격하신 분이 있나요?",
            content: "어젯밤 집 앞 가로등이 붉은색으로 깜빡이는 것을 보았습니다. 다들 조심하세요.",
            author: "익명",
            comments: 0,
            tag: "정보",
            date: new Date().toISOString()
          }
        ];
      });
      
      const [currentPage, setCurrentPage] = useState(1);
      const POSTS_PER_PAGE = 10;
      const menus = ["전체", "정보", "도움", "잡담", "거래", "전투"];
      const notices = ["프로토콜 시스템 격리 완료", "이상 데이터 감지 시 새로고침하십시오."];

      useEffect(() => {
        localStorage.setItem("anomaly_posts", JSON.stringify(posts));
      }, [posts]);

      useEffect(() => {
        setCurrentPage(1);
      }, [menu, search]);

      const filteredPosts = useMemo(() => {
        return posts.filter((post) => {
          const matchSearch = (post.title || "").toLowerCase().includes(search.toLowerCase());
          const matchMenu = menu === "전체" || post.tag === menu;
          return matchSearch && matchMenu;
        });
      }, [posts, search, menu]);

      const currentPosts = useMemo(() => {
        const indexOfLastPost = currentPage * POSTS_PER_PAGE;
        const indexOfFirstPost = indexOfLastPost - POSTS_PER_PAGE;
        return filteredPosts.slice(indexOfFirstPost, indexOfLastPost);
      }, [filteredPosts, currentPage]);
      
      const totalPages = Math.ceil(filteredPosts.length / POSTS_PER_PAGE);

      const handleCreatePost = () => {
        if (!title.trim() || !content.trim()) {
          setNotification("제목과 내용을 입력하세요.");
          return;
        }

        const newPost = {
          id: Date.now(),
          title,
          content,
          author: "익명",
          comments: 0,
          tag: menu === "전체" ? "잡담" : menu,
          date: new Date().toISOString()
        };

        setPosts((prev) => [newPost, ...prev]);
        setTitle("");
        setContent("");
        setNotification("게시글이 안전하게 등록되었습니다.");
        setIsWriting(false);
        setCurrentPage(1);
      };

      return (
        <div className="min-h-screen text-zinc-100 font-sans">
          <header className="border-b border-zinc-800 bg-black sticky top-0 z-50 backdrop-blur">
            <div className="max-w-6xl mx-auto flex items-center justify-between px-6 py-4">
              <div>
                <h1 className="text-2xl font-black tracking-tight text-red-500">anomaly:thread</h1>
                <p className="text-xs text-zinc-500">비인가 이상현상 커뮤니티</p>
              </div>
              <div className="flex gap-3 items-center">
                <input
                  value={search}
                  onChange={(e) => {
                    setSearch(e.target.value);
                    setNotification(`검색 중: ${e.target.value || "전체 게시글"}`);
                  }}
                  placeholder="괴현상 검색"
                  className="bg-zinc-900 border border-zinc-700 rounded-xl px-4 py-2 text-sm w-56 outline-none focus:border-red-500 text-zinc-100"
                />
                <button
                  onClick={() => setIsWriting(true)}
                  className="bg-red-600 hover:bg-red-500 transition px-4 py-2 rounded-xl text-sm font-semibold"
                >
                  글쓰기
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-[260px_1fr_280px] gap-6">
            <aside className="space-y-4">
              <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 shadow-lg">
                <h2 className="font-bold text-lg mb-3 text-red-400">메뉴</h2>
                <ul className="space-y-2 text-sm text-zinc-300">
                  {menus.map((item) => (
                    <li
                      key={item}
                      onClick={() => {
                        setMenu(item);
                        setNotification(`${item} 구역에 진입했습니다.`);
                      }}
                      className={`cursor-pointer rounded-lg px-3 py-2 transition ${
                        menu === item ? "bg-red-500/20 text-red-300" : "hover:text-red-400"
                      }`}
                    >
                      {item}
                    </li>
                  ))}
                </ul>
              </div>

              <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 shadow-lg">
                <h2 className="font-bold text-lg mb-3 text-red-400">공지</h2>
                <div className="space-y-3 text-sm">
                  {notices.map((item, idx) => (
                    <div key={idx} className="border-b border-zinc-800 pb-2 text-zinc-300">• {item}</div>
                  ))}
                </div>
              </div>
            </aside>

            <section className="space-y-4">
              <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 relative overflow-hidden">
                <div className="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_top,red,transparent_70%)]" />
                <div className="relative z-10 flex items-center justify-between">
                  <div>
                    <div className="mb-2 text-xs text-green-400 font-mono">SYSTEM // {notification}</div>
                    <h2 className="text-3xl font-black tracking-tight">anomaly:thread</h2>
                    <p className="text-zinc-500 text-sm mt-2">이상현상 생존자 단말기</p>
                  </div>
                  <div className="text-right">
                    <div className="text-sm text-zinc-500 mb-2">필터 상태</div>
                    <div className="inline-flex px-4 py-2 rounded-xl bg-red-500/20 text-red-300 font-semibold">{menu}</div>
                  </div>
                </div>
              </div>

              <div className="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-lg flex flex-col min-h-[500px]">
                <div className="flex items-center justify-between border-b border-zinc-800 px-5 py-4">
                  <h2 className="font-bold text-lg">기록된 스레드</h2>
                  <div className="text-xs text-green-400 font-mono">LOCAL SECURED</div>
                </div>

                <div className="flex-1">
                  {currentPosts.length === 0 && (
                    <div className="px-5 py-20 text-center text-zinc-500">관측된 이상현상이 없습니다.</div>
                  )}

                  {currentPosts.map((post) => (
                    <div
                      key={post.id}
                      onClick={() => setSelectedPost({ ...post })}
                      className="px-5 py-4 border-b border-zinc-800 hover:bg-zinc-800/40 transition cursor-pointer"
                    >
                      <div className="flex items-center gap-2 mb-2">
                        <span className="text-[11px] px-2 py-1 rounded-full bg-red-500/20 text-red-300 border border-red-500/20">{post.tag}</span>
                      </div>
                      <div className="font-semibold text-zinc-100 mb-2 hover:text-red-400">{post.title}</div>
                      <div className="flex items-center justify-between text-xs text-zinc-500">
                        <div className="flex items-center gap-3">
                          <span>{post.author}</span>
                          <span>{new Date(post.date).toLocaleTimeString("ko-KR", {hour: "2-digit", minute: "2-digit"})}</span>
                        </div>
                        <button
                          onClick={(e) => {
                            e.stopPropagation();
                            setLikedPosts(prev => prev.includes(post.id) ? prev.filter(p => p !== post.id) : [...prev, post.id]);
                          }}
                          className={`px-2 py-1 rounded-lg text-xs transition ${likedPosts.includes(post.id) ? "bg-red-500/20 text-red-300" : "bg-zinc-800"}`}
                        >
                          {likedPosts.includes(post.id) ? "♥ 확보됨" : "♡ 보관"}
                        </button>
                      </div>
                    </div>
                  ))}
                </div>

                {totalPages > 1 && (
                  <div className="flex items-center justify-center gap-4 py-4 border-t border-zinc-800 bg-black/20">
                    <button disabled={currentPage === 1} onClick={() => setCurrentPage(p => p - 1)} className="text-xs px-3 py-1.5 rounded bg-zinc-800 disabled:opacity-30">이전</button>
                    <div className="text-sm font-semibold text-red-400">{currentPage} / {totalPages}</div>
                    <button disabled={currentPage === totalPages} onClick={() => setCurrentPage(p => p + 1)} className="text-xs px-3 py-1.5 rounded bg-zinc-800 disabled:opacity-30">다음</button>
                  </div>
                )}
              </div>
            </section>

            <aside>
              <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 shadow-lg sticky top-24">
                <h2 className="font-bold text-lg text-red-400 mb-3">연동 프로토콜</h2>
                <div className="text-sm text-zinc-400 leading-relaxed space-y-2">
                  <p>안전한 단독망 로컬 저장 환경 브라우징 모드입니다.</p>
                </div>
              </div>
            </aside>
          </main>

          {selectedPost && (
            <div className="fixed inset-0 z-[90] bg-zinc-950 overflow-y-auto p-4 flex items-center justify-center">
              <div className="w-full max-w-4xl bg-zinc-900 border border-red-900/50 rounded-3xl p-8 shadow-2xl">
                <div className="flex items-center justify-between mb-4">
                  <div>
                    <div className="text-xs text-red-400 mb-1">{selectedPost.tag}</div>
                    <h3 className="text-2xl font-black">{selectedPost.title}</h3>
                  </div>
                  <button onClick={() => setSelectedPost(null)} className="text-sm bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl">← 목록으로</button>
                </div>
                <div className="text-sm text-zinc-500 mb-6">{new Date(selectedPost.date).toLocaleString("ko-KR")}</div>
                <div className="text-zinc-300 text-sm whitespace-pre-wrap leading-relaxed min-h-[150px]">{selectedPost.content}</div>
              </div>
            </div>
          )}

          {isWriting && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
              <div className="w-full max-w-2xl bg-zinc-900 border border-zinc-800 rounded-3xl p-6 shadow-2xl">
                <div className="flex items-center justify-between mb-6">
                  <h2 className="text-xl font-bold">기록 전송 프로토콜</h2>
                  <button onClick={() => setIsWriting(false)} className="bg-zinc-800 text-sm px-4 py-2 rounded-xl">닫기</button>
                </div>
                <div className="space-y-4">
                  <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="현상 제목" className="w-full bg-black/40 border border-zinc-700 rounded-xl px-4 py-3 outline-none focus:border-red-500 text-zinc-100" />
                  <textarea value={content} onChange={(e) => setContent(e.target.value)} placeholder="상세 내용 요약" rows="6" className="w-full bg-black/40 border border-zinc-700 rounded-xl px-4 py-3 outline-none focus:border-red-500 text-zinc-100 resize-none"></textarea>
                  <button onClick={handleCreatePost} className="w-full bg-red-600 hover:bg-red-500 py-3 rounded-xl font-semibold transition">데이터 송신</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = tragedies = RoyalReactDOM.createRoot(document.getElementById("root"));
    root.render(<AbnormalCommunity />);
  </script>
</body>
</html>
